    <style>
        body, html {

            font-family: 'Segoe UI', Arial, sans-serif; background-color: #000;
        }
        .background-image {
            position: fixed; left: 0; right: 0; top: 0; bottom: 0; z-index: -1;
            background-image: url('https://raw.githubusercontent.com/msulima622-dev/dark-love-game/main/IMG_20260403_163725.jpg');
            background-size: cover; background-position: center;
            filter: blur(8px) brightness(30%); transform: scale(1.1);
        }
        .container {
            display: flex; flex-direction: column; align-items: center;

            font-size: 0.9rem; outline: none; text-align: center; margin-bottom: 20px;
            -webkit-appearance: none;
        }
        /* Основная зона контента, которая занимает свободное место */
        .content-wrap {
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; width: 100%;
        }
        #display-area { 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 0, 85, 0.5);

        }
        #action { font-size: 1rem; line-height: 1.4; color: #fff; }
        
        #timer {
            font-size: 4rem; font-weight: bold; color: #ff0055; 
            margin: 20px 0; display: none; text-shadow: 0 0 20px #ff0055;
        }
        /* Кнопка теперь прижата к низу через отступ */
        .btn-wrap { margin-bottom: 20px; width: 100%; }
        button {
            background: linear-gradient(45deg, #ff0055, #80002b); border: none; padding: 18px 45px; 
            color: white; font-size: 1.1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); text-transform: uppercase;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.6; }
    </style>
</head>

    </div>

    </div>
</div>
