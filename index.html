<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ТЁМНАЯ СТОРОНА ЛЮБВИ 😈🖤</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif; background-color: #000;
        }
        /* Используем прямую ссылку на изображение для надежности */
        .background-image {
            position: fixed; left: 0; right: 0; top: 0; bottom: 0; z-index: -1;
            background-image: url('https://raw.githubusercontent.com/msulima622-dev/dark-love-game/main/IMG_20260403_163725.jpg');
            background-size: cover; background-position: center;
            filter: blur(8px) brightness(30%); transform: scale(1.1);
        }
        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 15px; box-sizing: border-box; text-align: center;
        }
        h1 {
            color: #ff0055; text-shadow: 0 0 15px #ff0055;
            margin-bottom: 20px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase;
        }
        /* Маленький селектор */
        select { 
            background: rgba(20, 20, 20, 0.9); color: #fff; padding: 10px; 
            border: 2px solid #ff0055; border-radius: 12px; width: 60%; max-width: 200px; 
            font-size: 0.9rem; outline: none; text-align: center; margin-bottom: 15px;
            -webkit-appearance: none;
        }
        /* Аккуратное окно задания */
        #display-area { 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 0, 85, 0.5);
            border-radius: 15px; padding: 15px; min-height: 90px;
            display: flex; align-items: center; justify-content: center; 
            width: 85%; max-width: 350px; box-sizing: border-box;
        }
        #action { font-size: 0.95rem; line-height: 1.3; color: #fff; }
        
        /* Крупный таймер ПО ЦЕНТРУ */
        #timer {
            font-size: 4.5rem; font-weight: bold; color: #ff0055; 
            margin: 15px 0; display: none; text-shadow: 0 0 20px #ff0055;
            width: 100%; text-align: center;
        }
        button {
            background: linear-gradient(45deg, #ff0055, #80002b); border: none; padding: 16px 40px; 
            color: white; font-size: 1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); text-transform: uppercase;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="background-image"></div>
<audio id="endSound" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

<div class="container">
    <h1>ТЁМНАЯ СТОРОНА ЛЮБВИ 😈🖤</h1>

    <select id="role">
        <option value="her">Для неё 👰🏻🍑</option>
        <option value="him">Для него 🤵🏻🍌💦</option>
    </select>

    <div id="display-area">
        <div id="action">Готовы?</div>
    </div>

    <div id="timer">06:00</div>

    <button onclick="startDirtyGame()">ХОЧУ ГРЯЗЬ 🔞</button>
</div>

<script>
    const actionsForHer = ["«Facesitting»: Сядь ему на лицо всем весом. Не вставай, пока не получишь оргазм.", "«Золотой контроль»: Помочись на него в душе.", "«Анальный десерт»: Пока он делает куни, засунь палец ему в анус.", "«Лизание сапог»: Заставь его вылизывать твою обувь.", "«Слюнявый поводок»: Выпусти слюну ему в рот.", "«Сладкий финал»: Капни мед на его ключицы.", "«Твой ритм»: Двигай его ладонью на своем клиторе.", "«Место в ногах»: Партнер раздевает тебя зубами.", "«Ремень»: Свяжи его руки ремнем.", "«Лицом в промежность»: Силой прижми его лицо к себе.", "«Новая точка»: Во время орала, введи палец ему в анус.", "«Растяжка»: Растяни его анус 2-3 пальцами.", "«Два пальца»: Введи в анус сразу два пальца.", "«Живой сосуд»: Плюнь ему в рот, пусть держит 1 минуту.", "«Унижение ртом»: Набери слюны и медленно выпусти ему в рот.", "«Метка хозяина»: Оставь сильный засос на его лобке.", "«Ледяной шок»: Делай орал с кубиком льда.", "«Ремень-удавка»: Используй ремень как поводок.", "«Королевская наездница»: Трахни его сама, прижав его руки.", "«Вкус хозяйки»: Заставь его вылизать тебя после дня.", "«Личный унитаз»: Помочись на него."];
    const actionsForHim = ["«Snowballing»: Кончи ей в рот и заставь проглотить после поцелуя.", "«Поводье»: Мотай её волосы на кулак во время секса.", "«Анальный террор»: Войди в анус без предупреждения.", "«Место в ногах»: Партнерша раздевает тебя зубами.", "«Захват горла»: Плотно обхвати её горло ладонью.", "«Ремень»: Свяжи её руки ремнем.", "«Новая точка»: Во время орала, введи палец ей в анус.", "«Растяжка»: Растяни её анус 2-3 пальцами.", "«Двойная стимуляция»: Держи палец в анусе во время секса.", "«Без предупреждения»: Резко смени отверстие на анус.", "«Два пальца»: Введи ей в анус сразу два пальца.", "«Facefuck»: Трахай её рот на всю глубину.", "«Горловой замок»: Трахай рот до слез и кончи в горло.", "«До конца»: Заставь её принять член максимально глубоко.", "«Клеймо»: Кончи в рот и заставь показать в зеркале.", "«Сбор семени»: Кончи на живот, пусть соберет и оближет.", "«Финал на язык»: Залей ей язык полностью.", "«Анальное подчинение»: Растягивай её анус, заставляя смотреть."];

    let timerInterval;

    function formatTime(seconds) {
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        return mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
    }

    function startDirtyGame() {
        const sound = document.getElementById('endSound');
        sound.play().then(() => { sound.pause(); sound.currentTime = 0; }).catch(() => {});

        clearInterval(timerInterval);
        const role = document.getElementById('role').value;
        const arr = (role === 'her') ? actionsForHer : actionsForHim;
        document.getElementById('action').innerText = arr[Math.floor(Math.random() * arr.length)];
        
        let timeLeft = 360; 
        const timerEl = document.getElementById('timer');
        timerEl.style.display = 'block';
        timerEl.innerText = formatTime(timeLeft);

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerEl.innerText = "ФИНАЛ!";
                sound.play();
            }
        }, 1000);
    }
</script>

</body>
</html>
