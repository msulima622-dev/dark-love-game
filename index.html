<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ТЁМНАЯ СТОРОНА ЛЮБВИ 😈🖤</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(3px) brightness(40%); transform: scale(1.1);
            background-image: url('IMG_20260403_163725.jpg');
        }
        .container {
            position: relative; 
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            text-align: center;
        }
        h1 {
            color: #ff0055; text-shadow: 0 0 15px #ff0055;
            font-size: 1.1rem; text-transform: uppercase; margin: 0 0 15px 0;
        }
        select { 
            background: rgba(30, 0, 10, 0.9); color: #fff; padding: 12px; 
            border: 2px solid #ff0055; border-radius: 12px; width: 220px;
            font-size: 0.9rem; outline: none; margin-bottom: 20px;
        }
        #display-area { 
            background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255, 0, 85, 0.5);
            border-radius: 20px; padding: 20px; width: 100%; max-width: 380px;
            min-height: 160px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #action { font-size: 1rem; line-height: 1.4; color: #fff; }
        #timer {
            font-size: 4rem; font-weight: bold; color: #ff0055; 
            text-shadow: 0 0 20px #ff0055; margin-top: 10px; display: none;
        }
        .btn-container { margin-top: 30px; }
        button {
            background: linear-gradient(45deg, #ff0055, #80002b); border: none; 
            padding: 20px 50px; color: white; font-size: 1.2rem; font-weight: bold; 
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            text-transform: uppercase;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

<div id="bg"></div>
<audio id="endSound" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

<div class="container">
    <h1>ТЁМНАЯ СТОРОНА ЛЮБВИ 😈🖤</h1>

    <select id="role">
        <option value="her">Для неё 👰🏻🍑</option>
        <option value="him">Для него 🤵🏻🍌💦</option>
    </select>

    <div id="display-area">
        <div id="timer">06:00</div>
        <div id="action">Бросай кубик... 🎲</div>
    </div>

    <div class="btn-container">
        <button onclick="startDirtyGame()">ХОЧУ ГРЯЗЬ 🔞</button>
    </div>
</div>

<script>
    const actionsForHer = [
        "«Facesitting»: Сядь ему на лицо всем весом. Не вставай, пока не получишь оргазм сама.",
        "«Золотой контроль»: Прикажи ему встать на колени в душе и помочись на него, глядя в глаза.",
        "«Анальный десерт»: Пока он делает куни, засунь палец ему в анус. Если отстранится — тяни за волосы.",
        "«Лизание сапог»: Заставь его ползать у твоих ног и вылизывать твою обувь или ступни.",
        "«Слюнявый поводок»: Выпусти слюну прямо ему в рот. Прикажи слизать всё без рук.",
        "«Сладкий финал»: Капни мед на его ключицы. Слизывай медленно, дразня языком.",
        "«Твой ритм»: Положи его руку себе на клитор и двигай его ладонью так, как нравится тебе.",
        "«Место в ногах»: Партнер раздевает тебя зубами, стоя на коленях. Руки за спиной.",
        "«Ремень»: Свяжи руки партнера ремнем над головой и делай с ним всё, что захочешь.",
        "«Лицом в промежность»: Силой прижми лицо партнера к своим гениталиям.",
        "«Новая точка»: Во время орала партнеру, введи палец ему в анус с кучей смазки.",
        "«Растяжка»: Используй 2-3 пальца, чтобы максимально широко растянуть анус партнера.",
        "«Два пальца»: Введи в анус сразу два пальца и вращай ими.",
        "«Живой сосуд»: Плюнь партнеру в рот и прикажи держать слюну 1 минуту, не глотая.",
        "«Унижение ртом»: Набери полный рот слюны и медленно выпусти её прямо в рот партнеру.",
        "«Метка хозяина»: Оставь сильный засос на лобке или внутренней стороне бедра партнера.",
        "«Ледяной шок»: Делай орал с кубиком льда во рту.",
        "«Ремень-удавка»: Используй ремень как поводок, притягивая лицо партнера к гениталиям.",
        "«Королевская наездница»: Сядь сверху, прижми его руки к кровати. Трахни его сама.",
        "«Вкус хозяйки»: Заставь его вылизывать тебя после долгого дня.",
        "«Личный унитаз»: Помочись на живот или в рот партнера."
    ];

    const actionsForHim = [
        "«Snowballing»: Кончи партнерше в рот, поцелуй её, а затем заставь её проглотить остатки.",
        "«Поводье»: Используй ремень через её рот как удила или мотай её волосы на кулак.",
        "«Анальный террор»: Растягивай её анус пальцами, а затем входи без предупреждения.",
        "«Место в ногах»: Партнерша раздевает тебя зубами, стоя на коленях.",
        "«Захват горла»: Плотно обхвати горло партнерши ладонью, фиксируя её взгляд.",
        "«Ремень»: Свяжи руки партнерши ремнем над головой.",
        "«Новая точка»: Во время орала партнерше, введи палец ей в анус с кучей смазки.",
        "«Растяжка»: Используй 2-3 пальца, чтобы максимально широко растянуть анус партнерши.",
        "«Двойная стимуляция»: Во время вагинального секса держи палец в анусе партнерши.",
        "«Без предупреждения»: В разгар секса резко смени отверстие и войди в анус.",
        "«Два пальца»: Введи в анус сразу два пальца и вращай ими.",
        "«Facefuck»: Трахай рот партнерши на всю глубину.",
        "«Горловой замок»: Трахай рот до слез, а затем кончи в горло.",
        "«До конца»: Заставь партнершу принять член максимально глубоко.",
        "«Клеймо»: Кончи ей в рот и заставь показать это в зеркале.",
        "«Сбор семени»: Кончи на живот, заставь её собрать это пальцами.",
        "«Финал на язык»: Заставь партнершу высунуть язык и залей его полностью.",
        "«Анальное подчинение»: Медленно растягивай её анус пальцами."
    ];

    let timerInterval;

    function formatTime(seconds) {
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        return mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
    }

    function startDirtyGame() {
        const actionEl = document.getElementById('action');
        const timerEl = document.getElementById('timer');
        const role = document.getElementById('role').value;
        const arr = (role === 'her') ? actionsForHer : actionsForHim;
        
        clearInterval(timerInterval);
        timerEl.style.display = 'none';

        let rolls = 0;
        let rollEffect = setInterval(() => {
            actionEl.innerText = arr[Math.floor(Math.random() * arr.length)];
            rolls++;
            if (rolls > 12) {
                clearInterval(rollEffect);
                actionEl.innerText = arr[Math.floor(Math.random() * arr.length)];
                startTimer();
            }
        }, 80);
    }

    function startTimer() {
        const timerEl = document.getElementById('timer');
        const sound = document.getElementById('endSound');
        sound.play().then(() => { sound.pause(); sound.currentTime = 0; }).catch(() => {});

        let timeLeft = 360; 
        timerEl.style.display = 'block';
        timerEl.innerText = formatTime(timeLeft);

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerEl.innerText = "ФИНАЛ! 🔥";
                sound.play();
            }
        }, 1000);
    }
</script>

</body>
</html>
