<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тёмная Сторона Любви</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; margin: 0; padding: 20px;
        }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 95vh; }
        h1 { color: #ff0055; text-shadow: 0 0 15px #ff0055; margin-bottom: 25px; font-size: 1.6rem; letter-spacing: 2px; }
        
        .role-selector { margin-bottom: 25px; width: 100%; }
        select { 
            background: #111; color: #fff; padding: 15px; 
            border: 2px solid #ff0055; border-radius: 15px; 
            width: 90%; max-width: 320px; font-size: 1.2rem; outline: none;
        }

        #display-area { 
            background: rgba(20, 20, 20, 0.9); border: 1px solid #ff0055; 
            border-radius: 20px; padding: 30px; margin: 20px 0; min-height: 180px;
            display: flex; flex-direction: column; justify-content: center; width: 85%;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
        }
        
        #action { font-size: 1.4rem; line-height: 1.5; color: #f0f0f0; font-weight: 500; }
        #timer { font-size: 4rem; font-weight: bold; color: #ff0055; margin-top: 20px; display: none; text-shadow: 0 0 15px #ff0055; }

        button {
            background: linear-gradient(45deg, #ff0055, #80002b); border: none; padding: 22px 45px; 
            color: white; font-size: 1.4rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 25px rgba(255, 0, 85, 0.4); transition: 0.3s;
            text-transform: uppercase; margin-top: 10px;
        }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="container">
    <h1>ТЁМНАЯ СТОРОНА 😈</h1>

    <div class="role-selector">
        <select id="role">
            <option value="her">Для неё 👰🏻🍑</option>
            <option value="him">Для него 🤵🏻🍌💦</option>
        </select>
    </div>

    <div id="display-area">
        <div id="action">Выбери роль и нажми кнопку...</div>
        <div id="timer">05:00</div>
    </div>

    <button onclick="startDirtyGame()">ХОЧУ ГРЯЗЬ 🔞</button>
</div>

<script>
    const actionsForHer = [
        "«Facesitting»: Сядь ему на лицо всем весом. Не вставай, пока не получишь оргазм сама.",
        "«Золотой контроль»: Прикажи ему встать на колени в душе и помочись на него, глядя в глаза.",
        "«Анальный десерт»: Пока он делает куни, засунь палец ему в анус. Если отстранится — тяни за волосы.",
        "«Лизание сапог»: Заставь его ползать у твоих ног и вылизывать твою обувь или ступни, пока ты стоишь над ним.",
        "«Слюнявый поводок»: Выпусти слюну прямо ему в рот. Прикажи слизать всё без рук.",
        "«Сладкий финал»: Капни мед на его ключицы. Слизывай медленно, дразня языком.",
        "«Твой ритм»: Положи его руку себе на клитор и двигай его ладонью так, как нравится тебе. За попытку сменить темп — укуси.",
        "«Место в ногах»: Партнер раздевает тебя зубами, стоя на коленях. Руки за спиной.",
        "«Ремень»: Свяжи руки партнера ремнем над головой и делай с ним всё, что захочешь.",
        "«Лицом в промежность»: Силой прижми лицо партнера к своим гениталиям. Пусть вдыхает запах и вылизывает всё до капли.",
        "«Новая точка»: Во время орала партнеру, введи палец ему в анус с кучей смазки.",
        "«Растяжка»: Используй 2-3 пальца, чтобы максимально широко растянуть анус партнера. Комментируй то, что видишь.",
        "«Два пальца»: Введи в анус сразу два пальца и вращай ими, пока партнер занят твоим органом.",
        "«Живой сосуд»: Плюнь партнеру в рот и прикажи держать слюну 1 минуту, не глотая.",
        "«Унижение ртом»: Набери полный рот слюны и медленно выпусти её прямо в рот партнеру.",
        "«Метка хозяина»: Оставь сильный засос на лобке или внутренней стороне бедра партнера.",
        "«Ледяной шок»: Делай орал с кубиком льда во рту, а затем резко смени на горячее дыхание.",
        "«Ремень-удавка»: Используй ремень как поводок, притягивая лицо партнера к гениталиям.",
        "«Королевская наездница»: Сядь сверху, прижми его руки к кровати. Трахни его сама, игнорируя его темп.",
        "«Вкус хозяйки»: Заставь его вылизывать тебя после долгого дня, не давая вдохнуть свежий воздух.",
        "«Личный унитаз»: Помочись на живот или в рот партнера (по согласию)."
    ];

    const actionsForHim = [
        "«Snowballing»: Кончи партнерше в рот, поцелуй её, а затем заставь её проглотить остатки.",
        "«Поводье»: Он использует ремень через твой рот или мотает твои волосы на кулак, управляя твоей головой.",
        "«Анальный террор»: Растягивай её анус пальцами, комментируя то, что видишь, а затем входи без предупреждения.",
        "«Место в ногах»: Партнер раздевает тебя зубами, стоя на коленях. Руки за спиной.",
        "«Захват горла»: Плотно обхвати горло партнера ладонью, фиксируя его взгляд на себе.",
        "«Ремень»: Свяжи руки партнера ремнем над головой и делай с ним всё, что захочешь.",
        "«Новая точка»: Во время орала партнеру, введи палец ему в анус с кучей смазки.",
        "«Растяжка»: Используй 2-3 пальца, чтобы максимально широко растянуть анус партнера. Комментируй то, что видишь.",
        "«Двойная стимуляция»: Во время вагинального секса держи палец в анусе, двигая им в такт.",
        "«Без предупреждения»: В разгар секса резко смени отверстие и войди в анус без прелюдий.",
        "«Два пальца»: Введи в анус сразу два пальца и вращай ими, пока партнер занят твоим органом.",
        "«Facefuck»: Трахай рот партнерши на всю глубину, задавая темп рукой на затылке.",
        "«Горловой замок»: Трахай рот до слез, а затем кончи в горло и зажми ей рот ладонью.",
        "«До конца»: Заставь партнершу принять член максимально глубоко и удерживай её голову так несколько секунд.",
        "«Клеймо»: Кончи ей в рот и заставь показать это в зеркале, прежде чем она проглотит.",
        "«Сбор семени»: Кончи на живот, заставь её собрать это пальцами и облизать их.",
        "«Финал на язык»: Заставь партнера высунуть язык и залей его полностью, пока не начнет капать.",
        "«Анальное подчинение»: Он медленно растягивает твой анус пальцами со смазкой, заставляя тебя смотреть в зеркало на этот процесс и описывать свои ощущения."
    ];

    let timerInterval;

    function formatTime(seconds) {
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function startDirtyGame() {
        clearInterval(timerInterval);
        
        let role = document.getElementById('role').value;
        let selectedArray = (role === 'her') ? actionsForHer : actionsForHim;
        const randomAction = selectedArray[Math.floor(Math.random() * selectedArray.length)];
        
        document.getElementById('action').innerText = randomAction;
        
        let timeLeft = 300; // 5 минут в секундах
        const timerEl = document.getElementById('timer');
        timerEl.style.display = 'block';
        timerEl.innerText = formatTime(timeLeft);

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerEl.innerText = "ВРЕМЯ ВЫШЛО!";
            }
        }, 1000);
    }
</script>

</body>
</html>
