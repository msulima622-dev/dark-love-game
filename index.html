<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ТЁМНАЯ СТОРОНА ЛЮБВИ 😈🖤</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-size: cover; background-position: center;
            filter: blur(3px) brightness(40%); transform: scale(1.1);
            background-image: url('IMG_20260403_163725.jpg');
        }

        /* Контейнер для капель — ИГНОРИРУЕТ КЛИКИ */
        #semen-drops-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        
        .drop {
            position: absolute;
            background: rgba(245, 245, 235, 0.9); /* Густой молочный цвет */
            border-radius: 50% 50% 50% 50% / 20% 20% 80% 80%;
            box-shadow: inset -2px -4px 6px rgba(0,0,0,0.1), 0 2px 4px rgba(255,255,255,0.4);
            animation: drip linear infinite;
        }

        @keyframes drip {
            0% { transform: translateY(-100px) scaleX(1); }
            100% { transform: translateY(110vh) scaleX(0.8); }
        }

        .container {
            position: relative; z-index: 100; /* Выше фона и капель */
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        
        h1 {
            color: #ff0055; text-shadow: 0 0 15px #ff0055;
            font-size: 1.1rem; text-transform: uppercase; margin-bottom: 15px;
        }
        
        select { 
            background: rgba(30, 0, 10, 0.9); color: #fff; padding: 12px; 
            border: 2px solid #ff0055; border-radius: 12px; width: 220px;
            margin-bottom: 20px; position: relative; z-index: 101;
        }
        
        #display-area { 
            background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255, 0, 85, 0.5);
            border-radius: 20px; padding: 20px; width: 100%; max-width: 380px;
            min-height: 160px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        
        #action { font-size: 1rem; line-height: 1.4; color: #fff; text-align: center; }
        #timer { font-size: 4rem; font-weight: bold; color: #ff0055; display: none; }
        
        .btn-container { margin-top: 30px; position: relative; z-index: 9999; }
        
        button {
            background: linear-gradient(45deg, #ff0055, #80002b); border: none; 
            padding: 20px 50px; color: white; font-size: 1.2rem; font-weight: bold; 
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            text-transform: uppercase;
            pointer-events: auto; /* Железно разрешаем клики */
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="bg"></div>
<div id="semen-drops-container"></div>

    // ГЕНЕРАЦИЯ КАПЕЛЬ
    function createDrops() {
        const container = document.getElementById('semen-drops-container');
        for (let i = 0; i < 12; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            const width = Math.random() * 10 + 10; 
            drop.style.width = width + 'px';
            drop.style.height = (width * 2.5) + 'px';
            drop.style.left = Math.random() * 95 + 'vw';
            drop.style.animationDuration = (Math.random() * 5 + 7) + 's';
            drop.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(drop);
        }
    }

    window.onload = createDrops;

        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        return mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
    }
