<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ТЁМНАЯ СТОРОНА ЛЮБВИ 😈🖤</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif; background-color: #000;
        }
        .background-image {
            position: fixed; left: 0; right: 0; top: 0; bottom: 0; z-index: -1;
            background-image: url('bg.jpg'); /* ПЕРЕИМЕНУЙ ФАЙЛ НА GITHUB В bg.jpg */
            background-size: cover; background-position: center;
            filter: blur(8px) brightness(30%); transform: scale(1.1);
        }
        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 15px; box-sizing: border-box;
        }
        h1 {
            color: #ff0055; text-shadow: 0 0 15px #ff0055;
            margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; text-transform: uppercase;
        }
        /* Уменьшенный селектор */
        select { 
            background: rgba(20, 20, 20, 0.9); color: #fff; padding: 10px; 
            border: 2px solid #ff0055; border-radius: 12px; width: 80%; max-width: 250px; 
            font-size: 1rem; outline: none; text-align: center; margin-bottom: 15px;
        }
        /* Уменьшенное окно задания */
        #display-area { 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 0, 85, 0.5);
            border-radius: 15px; padding: 20px; min-height: 120px;
            display: flex; align-items: center; justify-content: center; 
            width: 85%; max-width: 400px; box-sizing: border-box;
        }
        #action { font-size: 1.1rem; line-height: 1.4; color: #fff; text-align: center; }
        
        /* Таймер ОТДЕЛЬНО по центру */
        #timer {
            font-size: 4.5rem; font-weight: bold; color: #ff0055; 
            margin: 20px 0; display: none; text-shadow: 0 0 20px #ff0055;
        }
        button {
            background: linear-gradient(45deg, #ff0055, #80002b); border: none; padding: 18px 40px; 
            color: white; font-size: 1.1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); text-transform: uppercase;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="background-image"></div>
<audio id="endSound" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

<div class="container">
    <h1>ТЁМНАЯ СТОРОНА ЛЮБВИ 😈🖤</h1>

    <select id="role">
        <option value="her">Для неё 👰🏻🍑</option>
        <option value="him">Для него 🤵🏻🍌💦</option>
    </select>

    <div id="display-area">
        <div id="action">Нажми на кнопку...</div>
    </div>

    <div id="timer">06:00</div>

    <button onclick="startDirtyGame()">ХОЧУ ГРЯЗЬ 🔞</button>
</div>

<script>
    const actionsForHer = [
        "«Facesitting»: Сядь ему на лицо всем весом. Не вставай, пока не получишь оргазм сама.",
        "«Золотой контроль»: Прикажи ему встать на колени в душе и помочись на него.",
        "«Анальный десерт»: Пока он делает куни, засунь палец ему в анус.",
        "«Лизание сапог»: Заставь его ползать у твоих ног и вылизывать твою обувь.",
        "«Слюнявый поводок»: Выпусти слюну прямо ему в рот. Прикажи слизать всё без рук.",
        "«Сладкий финал»: Капни мед на его ключицы. Слизывай медленно.",
        "«Твой ритм»: Положи его руку себе на клитор и двигай его ладонью.",
        "«Место в ногах»: Партнер раздевает тебя зубами, стоя на коленях.",
        "«Ремень»: Свяжи руки партнера ремнем над головой.",
        "«Лицом в промежность»: Силой прижми лицо партнера к своим гениталиям.",
        "«Новая точка»: Во время орала партнеру, введи палец ему в анус.",
        "«Растяжка»: Используй 2-3 пальца, чтобы растянуть анус партнера.",
        "«Два пальца»: Введи в анус сразу два пальца и вращай ими.",
        "«Живой сосуд»: Плюнь партнеру в рот и прикажи держать слюну 1 минуту.",
        "«Унижение ртом»: Набери полный рот слюны и медленно выпусти её партнеру в рот.",
        "«Метка хозяина»: Оставь сильный засос на лобке партнера.",
        "«Ледяной шок»: Делай орал с кубиком льда во рту.",
        "«Ремень-удавка»: Используй ремень как поводок.",
        "«Королевская наездница»: Сядь сверху, прижми его руки к кровати.",
        "«Вкус хозяйки»: Заставь его вылизывать тебя после долгого дня.",
        "«Личный унитаз»: Помочись на живот или в рот партнера."
    ];

    const actionsForHim = [
        "«Snowballing»: Кончи партнерше в рот, поцелуй её, а затем заставь проглотить.",
        "«Поводье»: Используй ремень через её рот или мотай её волосы на кулак.",
        "«Анальный террор»: Растягивай её анус пальцами, а затем входи без предупреждения.",
        "«Место в ногах»: Партнер раздевает тебя зубами, стоя на коленях.",
        "«Захват горла»: Плотно обхвати горло партнерши ладонью.",
        "«Ремень»: Свяжи руки партнерши ремнем над головой.",
        "«Новая точка»: Во время орала партнерше, введи палец ей в анус.",
        "«Растяжка»: Используй 2-3 пальца, чтобы растянуть анус партнерши.",
        "«Двойная стимуляция»: Во время вагинального секса держи палец в анусе.",
        "«Без предупреждения»: В разгар секса резко смени отверстие и войди в анус.",
        "«Два пальца»: Введи в анус сразу два пальца и вращай ими.",
        "«Facefuck»: Трахай рот партнерши на всю глубину.",
        "«Горловой замок»: Трахай рот до слез, а затем кончи в горло.",
        "«До конца»: Заставь партнершу принять член максимально глубоко.",
        "«Клеймо»: Кончи ей в рот и заставь показать это в зеркале.",
        "«Сбор семени»: Кончи на живот, заставь её собрать это пальцами.",
        "«Финал на язык»: Заставь партнера высунуть язык и залей его полностью.",
        "«Анальное подчинение»: Медленно растягивай её анус пальцами."
    ];

    let timerInterval;

    function formatTime(seconds) {
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        return mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
    }

    function startDirtyGame() {
        const sound = document.getElementById('endSound');
        sound.play().then(() => { sound.pause(); sound.currentTime = 0; }).catch(() => {});

        clearInterval(timerInterval);
        const role = document.getElementById('role').value;
        const arr = (role === 'her') ? actionsForHer : actionsForHim;
        document.getElementById('action').innerText = arr[Math.floor(Math.random() * arr.length)];
        
        let timeLeft = 360; // 6 МИНУТ
        const timerEl = document.getElementById('timer');
        timerEl.style.display = 'block';
        timerEl.innerText = formatTime(timeLeft);

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerEl.innerText = "ФИНАЛ!";
                sound.play();
            }
        }, 1000);
    }
</script>

</body>
</html>
